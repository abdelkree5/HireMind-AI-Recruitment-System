name: Deploy to Production

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Dockerfile*'
      - 'docker-compose.yml'
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker image
      run: |
        docker build -f Dockerfile.backend -t hiremind-api:${{ github.sha }} -t hiremind-api:latest .
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      continue-on-error: true
    
    - name: Push to Docker Hub
      run: |
        docker push hiremind-api:${{ github.sha }}
        docker push hiremind-api:latest
      continue-on-error: true
    
    - name: Deploy notification
      run: echo "🚀 Backend deployed - Image: hiremind-api:${{ github.sha }}"

  deploy-frontend:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install and build
      run: |
        cd frontend
        npm ci
        npm run build
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./frontend/dist
      continue-on-error: true
    
    - name: Deploy notification
      run: echo "🚀 Frontend deployed to GitHub Pages"

  notify:
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()
    
    steps:
    - name: Send deployment notification
      run: |
        echo "✅ Deployment pipeline completed"
        echo "Backend: hiremind-api:${{ github.sha }}"
        echo "Commit: ${{ github.event.head_commit.message }}"
