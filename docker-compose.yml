version: '3.8'

# HireMind Local Development Environment
services:
  
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: hiremind-db
    environment:
      POSTGRES_DB: ${DB_NAME:-hiremind_db}
      POSTGRES_USER: ${DB_USER:-hiremind_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hiremind_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  
  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: hiremind-api
    environment:
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      DATABASE_URL: postgresql://${DB_USER:-hiremind_user}:${DB_PASSWORD:-secure_password}@postgres:5432/${DB_NAME:-hiremind_db}
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      EMBEDDING_DEVICE: cpu
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://frontend:80
    volumes:
      - ./backend:/app/backend
      - ./ai_engine:/app/ai_engine
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: hiremind-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules  # Prevent overwriting node_modules
    ports:
      - "5173:80"
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # Redis Cache (Optional - uncomment to enable)
  # redis:
  #   image: redis:7-alpine
  #   container_name: hiremind-cache
  #   volumes:
  #     - redis_data:/data
  #   ports:
  #     - "6379:6379"
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 3s
  #     retries: 3
  #   restart: unless-stopped

volumes:
  postgres_data:
  # redis_data:

networks:
  default:
    name: hiremind-network
